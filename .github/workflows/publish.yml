name: Publish NuGet Packages

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      package_version:
        description: Package version to publish
        required: true
      package_release_notes:
        description: Release notes to embed in the NuGet package
        required: false

env:
  NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5.0.0
        with:
          dotnet-version: |
            10.x
            9.x
            8.x
            7.x
            6.x

      - name: Install dotnet cake
        run: dotnet tool install -g Cake.Tool

      - name: Cache NuGet Packages
        uses: actions/cache@v5
        with:
          key: nuget-${{ hashFiles('Directory.Packages.props') }}
          path: ~/.nuget/packages

      - name: Resolve package version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ inputs.package_version }}"
          fi

          VERSION="${VERSION#v}"

          if [ -z "$VERSION" ]; then
            echo "Package version is required" >&2
            exit 1
          fi

          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Resolved version: $VERSION"

      - name: Generate ReleaseNotes.props
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            printf "%s" "${{ github.event.release.body }}" > release_notes.txt
          else
            printf "%s" "${{ inputs.package_release_notes }}" > release_notes.txt
          fi

          {
            echo '<Project>'
            echo '  <PropertyGroup>'
            echo '    <PackageReleaseNotes>'
            sed \
              -e 's/&/\&amp;/g' \
              -e 's/</\&lt;/g' \
              -e 's/>/\&gt;/g' \
              -e "s/'/\&apos;/g" \
              -e 's/"/\&quot;/g' \
              release_notes.txt
            echo '    </PackageReleaseNotes>'
            echo '  </PropertyGroup>'
            echo '</Project>'
          } > ReleaseNotes.props

      - name: Build the project and publish package
        run: |
          dotnet cake -- \
            --packageVersion="$PACKAGE_VERSION" \
            --releaseNotesPropsFile="$(pwd)/ReleaseNotes.props"
