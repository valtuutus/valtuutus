name: Build and test
on:
  push:
    paths-ignore:
      - '**.md'
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**.md'

concurrency:
  group: ${{ github.head_ref || github.sha }}
  cancel-in-progress: true
permissions:
  checks: write
  pull-requests: write
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup dotnet
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: |
            10.x
            9.x
            8.x
            7.x
            6.x
      - name: Install dotnet-coverage
        run: dotnet tool install --global dotnet-coverage
      - name: Build
        run: dotnet build Valtuutus.sln --no-incremental
      - name: Test with coverage
        run: dotnet-coverage collect 'dotnet test Valtuutus.sln -c Release --logger:"trx;LogFilePrefix=testResults"' -f cobertura -o 'coverage.xml' -s coverage.runsettings
      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          format: markdown
          output: both
      - name: Upload coverage artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: coverage_results
          path: coverage.xml
      - name: Upload PR event
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: pr_event
          path: ${{ github.event_path }}
      - name: Upload Test Result Files
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: ${{ github.workspace }}/**/TestResults/**/*
          retention-days: 5
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2.23.0
        if: always()
        with:
          trx_files: "${{ github.workspace }}/**/*.trx"
